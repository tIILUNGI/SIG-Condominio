
<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
 <link rel="stylesheet" href="Css/login.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal do Condomínio</title>

</head>

<body>

<main id="portal">

  <!-- ANIMAÇÃO 3D -->
  <aside>
    <div class="cubo c1">
      <div class="face frente"></div>
      <div class="face tras"></div>
      <div class="face direita"></div>
      <div class="face esquerda"></div>
      <div class="face cima"></div>
      <div class="face baixo"></div>
    </div>

    <div class="cubo c2">
      <div class="face frente"></div>
      <div class="face tras"></div>
      <div class="face direita"></div>
      <div class="face esquerda"></div>
      <div class="face cima"></div>
      <div class="face baixo"></div>
    </div>

    <div class="cubo c3">
      <div class="face frente"></div>
      <div class="face tras"></div>
      <div class="face direita"></div>
      <div class="face esquerda"></div>
      <div class="face cima"></div>
      <div class="face baixo"></div>
    </div>
  </aside>

  <!-- FORMULÁRIOS -->
  <section>

    <!-- MORADOR -->
    <form action="login.php" method="POST" id="morador" onsubmit="loginMorador(event)">
      <h2>Acesso de Moradores</h2>
      <input type="hidden" name="tipo" id="tipoMorador" value="morador">
      <input type="text" id="zimbo" name="numbi" placeholder="Número do BI" required >
      <input type="password" id="senhaMorador" name="senha" placeholder="Senha" minlength="6">
    
      <button type="submit">Entrar</button>
      <p class="toggle" onclick="alternar()">Sou Funcionário →</p>
    
    </form>



      <!-- FUNCIONARIO -->
    <form action="loginfuncionario.php" method="POST" id="funcionario" onsubmit="loginFuncionario(event)">
      <h2>Acesso de Funcionários</h2>
      <input type="text" id="numbi" placeholder="Número do BI" maxlength="27">
      <input type="text" id="senha" placeholder="Senha" minlength="6">
      <button type="submit">Entrar</button>
      <div id="processando">
        <div class="loader"></div>
        <p>Processando acesso...</p>
      </div>
      
      <p class="toggle" onclick="alternar()">← Sou Morador</p>
    </form>

  </section>

</main>

<section id="bem-vindo"></section>

<script src="javascript/login.js"></script>

</body>
</html>
