<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="css/login.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal do Condomínio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="js/theme-manager.js"></script>
    <script>
      const savedTheme = localStorage.getItem('nz-theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body>
<!-- Theme toggle removido -->
<main id="portal">
  <!-- ANIMAÇÃO 3D -->
  <aside>
    <div class="cubo c1">
      <div class="face frente"></div>
      <div class="face tras"></div>
      <div class="face direita"></div>
      <div class="face esquerda"></div>
      <div class="face cima"></div>
      <div class="face baixo"></div>
    </div>

    <div class="cubo c2">
      <div class="face frente"></div>
      <div class="face tras"></div>
      <div class="face direita"></div>
      <div class="face esquerda"></div>
      <div class="face cima"></div>
      <div class="face baixo"></div>
    </div>

    <div class="cubo c3">
      <div class="face frente"></div>
      <div class="face tras"></div>
      <div class="face direita"></div>
      <div class="face esquerda"></div>
      <div class="face cima"></div>
      <div class="face baixo"></div>
    </div>
  </aside>

  <!-- FORMULÁRIOS -->
  <section>

    <form action="api/loginmorador.php" method="POST" id="morador" onsubmit="return validarLogin(this);">
      <h2>Acesso de Moradores</h2>
      <div id="msg-erro" class="msg-erro" style="display:none;"></div>
      <input type="text" name="numbi" placeholder="Número do BI" required pattern="[A-Za-z0-9]{9,20}" oninvalid="this.setCustomValidity('Digite o número do BI (9-20 caracteres)')" oninput="this.setCustomValidity('')">
      <input type="password" name="senha" placeholder="Senha" required minlength="6" oninvalid="this.setCustomValidity('A senha deve ter pelo menos 6 caracteres')" oninput="this.setCustomValidity('')">
      <button type="submit">Entrar</button>
      <div class="form-links">
        <a href="pages/esqueceu-senha.html" class="forgot-link">Esqueceu a senha?</a>
        <a href="Visitante/visitante.php" class="register-link">Cadastrar-se</a>
      </div>
      <p class="toggle" onclick="alternar()">Sou Funcionário →</p>
      <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Voltar ao Início</a>
    </form>


    <form action="api/loginfuncionario.php" method="POST" id="funcionario" style="display:none;" onsubmit="return validarLogin(this);">
      <h2>Acesso de Funcionários</h2>
      <div id="msg-erro-func" class="msg-erro" style="display:none;"></div>
      <input type="text" name="numbi" placeholder="Número do BI" required pattern="[A-Za-z0-9]{9,20}" oninvalid="this.setCustomValidity('Digite o número do BI (9-20 caracteres)')" oninput="this.setCustomValidity('')">
      <input type="password" name="senha" placeholder="Senha" required minlength="6" oninvalid="this.setCustomValidity('A senha deve ter pelo menos 6 caracteres')" oninput="this.setCustomValidity('')">
      <button type="submit">Entrar</button>
      <div id="processando" style="display:none;">
        <div class="loader"></div>
        <p>Processando acesso...</p>
      </div>
      <div class="form-links">
        <a href="pages/esqueceu-senha.html" class="forgot-link">Esqueceu a senha?</a>
      </div>
      <p class="toggle" onclick="alternar()">← Sou Morador</p>
      <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Voltar ao Início</a>
    </form>

  </section>
</main>
<section id="bem-vindo"></section>

<script>
function validarLogin(form) {
    const numbi = form.numbi.value.trim();
    const senha = form.senha.value;
    if (!numbi) { alert('Por favor, preencha o número do BI'); form.numbi.focus(); return false; }
    if (!/^[A-Za-z0-9]{9,20}$/.test(numbi)) { alert('O número do BI deve conter 9 a 20 caracteres alfanuméricos'); form.numbi.focus(); return false; }
    if (!senha || senha.length < 6) { alert('A senha deve ter pelo menos 6 caracteres'); form.senha.focus(); return false; }
    return true;
}

function alternar() {
    const main = document.getElementById('portal');
    main.classList.toggle('active');
    
    // Tweak para mobile: garantir que o display mude após a animação se necessário
    const morador = document.getElementById('morador');
    const funcionario = document.getElementById('funcionario');
    
    if (main.classList.contains('active')) {
        setTimeout(() => { funcionario.style.display = 'flex'; morador.style.display = 'none'; }, 200);
    } else {
        setTimeout(() => { morador.style.display = 'flex'; funcionario.style.display = 'none'; }, 200);
    }
}

// Inicializar displays para evitar saltos
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('morador').style.display = 'flex';
    document.getElementById('funcionario').style.display = 'none';
});

// Mostrar erros vindos do PHP via query string
const erros = {
    credenciais: 'Número do BI ou senha incorrectos.',
    campos: 'Preencha todos os campos.',
    db: 'Erro de conexão. Tente novamente.',
    suspenso: 'Esta conta está suspensa. Contacte a administração.',
    acesso: 'Acesso negado. Faça login primeiro.',
    duplicado: 'Já existe uma conta com este BI ou email.',
    email: 'Email inválido.',
    senha_fraca: 'A senha deve ter pelo menos 6 caracteres.',
    campos_reg: 'Preencha todos os campos do registo.',
    bd: 'Erro ao guardar. Tente novamente.',
};
const params = new URLSearchParams(window.location.search);
const err = params.get('erro');
if (err && erros[err]) {
    const elId = document.getElementById('portal').classList.contains('active') ? 'msg-erro-func' : 'msg-erro';
    const el = document.getElementById(elId);
    if (el) { el.textContent = erros[err]; el.style.display = 'block'; }
}
if (params.get('ok') === 'registado') {
    const modal = document.createElement('div');
    modal.id = 'modal-sucesso';
    modal.className = 'modal-overlay';
    
    // Gerar uma data daqui a 3 dias
    const dataVisita = new Date();
    dataVisita.setDate(dataVisita.getDate() + 3);
    const dataFormatada = dataVisita.toLocaleDateString('pt-AO', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

    modal.innerHTML = `
      <div class="modal-content">
        <div class="modal-icon"><i class="fa-solid fa-circle-check"></i></div>
        <h3>Registo Efectuado com Sucesso!</h3>
        <p>A sua conta está actualmente com o estado <strong>PENDENTE</strong>.</p>
        <div class="modal-info-box">
          <p><i class="fa-solid fa-calendar-day"></i> <strong>Data da Visita:</strong><br>${dataFormatada}</p>
          <p><i class="fa-solid fa-location-dot"></i> <strong>Localização:</strong><br>Condomínio Nosso Zimbo, Viana, Luanda</p>
          <p><i class="fa-solid fa-phone"></i> <strong>Apoio ao Cliente:</strong><br>+244 923 000 000 / 912 000 000</p>
        </div>
        <p class="modal-instruction">Por favor, dirija-se ao condomínio na data gerada acima com os seus documentos originais (BI) para finalizar o processo de arrendamento ou compra e activar a sua residência.</p>
        <button onclick="document.getElementById('modal-sucesso').remove()" class="btn-fechar-modal">Compreendido</button>
      </div>
    `;
    document.body.appendChild(modal);
}
if (params.get('ok') === 'logout') {
    ['msg-erro','msg-erro-func'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.textContent = 'Sessão terminada com sucesso.'; el.style.display = 'block'; el.style.color = '#ccc'; }
    });
}
</script>

<style>
.back-btn {
    display: inline-block;
    margin-top: 1rem;
    padding: 8px 16px;
    background: var(--dark4);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    text-decoration: none;
    font-size: 0.85rem;
    transition: all 0.3s;
}
.back-btn:hover {
    background: var(--gold);
    color: #000;
}
.form-links {
    display: flex;
    justify-content: space-between;
    margin-top: 1rem;
}
.forgot-link, .register-link {
    font-size: 0.8rem;
    color: var(--gold);
    text-decoration: none;
}
.forgot-link:hover, .register-link:hover {
    text-decoration: underline;
}

/* Modal Sucesso */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    -webkit-backdrop-filter: blur(5px);
    backdrop-filter: blur(5px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    animation: fadeIn 0.3s ease;
}

.modal-content {
    background: var(--surface);
    color: var(--text);
    padding: 2.5rem;
    border-radius: 20px;
    max-width: 500px;
    width: 90%;
    text-align: center;
    border: 1px solid var(--border);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    animation: slideUp 0.4s ease;
}

.modal-icon {
    font-size: 4rem;
    color: #4caf7d;
    margin-bottom: 1.5rem;
}

.modal-content h3 {
    font-size: 1.8rem;
    margin-bottom: 1rem;
    color: var(--gold);
}

.modal-info-box {
    background: rgba(255,255,255,0.05);
    padding: 1.5rem;
    border-radius: 12px;
    margin: 1.5rem 0;
    text-align: left;
    border-left: 4px solid var(--gold);
}

.modal-info-box p {
    margin-bottom: 1rem;
    font-size: 0.95rem;
}

.modal-info-box p:last-child {
    margin-bottom: 0;
}

.modal-info-box i {
    color: var(--gold);
    margin-right: 8px;
    width: 20px;
}

.modal-instruction {
    font-size: 0.9rem;
    line-height: 1.5;
    color: var(--text-muted);
    margin-bottom: 2rem;
}

.btn-fechar-modal {
    background: var(--gold);
    color: #000;
    border: none;
    padding: 12px 30px;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s;
}

.btn-fechar-modal:hover {
    transform: scale(1.05);
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>
</body>
</html>
